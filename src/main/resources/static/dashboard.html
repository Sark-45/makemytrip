<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MakeMyTrip – Live Flight Tracker</title>

<!-- SockJS + STOMP (loaded from CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<style>
/* ═══════════════════════════════════════════════════════════════
   Design tokens
═══════════════════════════════════════════════════════════════ */
:root {
  --bg:        #f0f4f8;
  --surface:   #ffffff;
  --surface2:  #f7f9fc;
  --border:    #e2e8f0;
  --text:      #1a202c;
  --muted:     #718096;
  --accent:    #e53e3e;   /* MMT red */
  --accent2:   #ff6c00;

  --green:     #38a169;
  --green-bg:  #f0fff4;
  --green-bd:  #c6f6d5;

  --amber:     #d69e2e;
  --amber-bg:  #fffff0;
  --amber-bd:  #fefcbf;

  --red:       #e53e3e;
  --red-bg:    #fff5f5;
  --red-bd:    #fed7d7;

  --blue:      #3182ce;
  --blue-bg:   #ebf8ff;
  --blue-bd:   #bee3f8;

  --gray-bg:   #f7fafc;
  --gray-bd:   #e2e8f0;

  --radius:    12px;
  --shadow:    0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.12);
}

/* ═══════════════════════════════════════════════════════════════
   Reset & base
═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--accent); text-decoration: none; }

/* ═══════════════════════════════════════════════════════════════
   Header / Navbar
═══════════════════════════════════════════════════════════════ */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 34px; height: 34px; background: var(--accent);
  border-radius: 8px; display: flex; align-items: center;
  justify-content: center; font-size: 18px; color: #fff;
}
.logo-name { font-size: 20px; font-weight: 700; letter-spacing: -.5px; }
.logo-name span { color: var(--accent); }

.ws-status {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; font-weight: 500; color: var(--muted);
}
.ws-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #cbd5e0;
  transition: background .3s;
}
.ws-dot.connected  { background: var(--green); box-shadow: 0 0 0 3px var(--green-bg); }
.ws-dot.connecting { background: var(--amber); animation: blink 1s infinite; }
.ws-dot.error      { background: var(--red); }

@keyframes blink { 50% { opacity: .3; } }

/* ═══════════════════════════════════════════════════════════════
   Main layout
═══════════════════════════════════════════════════════════════ */
main {
  max-width: 1280px; margin: 0 auto;
  padding: 28px 24px;
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 24px;
}
@media (max-width: 900px) {
  main { grid-template-columns: 1fr; }
}

/* ═══════════════════════════════════════════════════════════════
   Section headings
═══════════════════════════════════════════════════════════════ */
.section-heading {
  font-size: 11px; font-weight: 700; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 14px;
}

/* ═══════════════════════════════════════════════════════════════
   Track bar
═══════════════════════════════════════════════════════════════ */
.track-bar {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 16px 20px; margin-bottom: 24px;
  display: flex; gap: 10px; align-items: center;
  box-shadow: var(--shadow);
}
.track-bar input {
  flex: 1; border: 1px solid var(--border); border-radius: 8px;
  padding: 9px 14px; font-size: 14px; font-family: 'Courier New', monospace;
  font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text); background: var(--surface2);
  transition: border-color .2s;
}
.track-bar input:focus { outline: none; border-color: var(--accent); }
.track-bar input::placeholder { font-family: inherit; font-weight: 400;
                                  text-transform: none; letter-spacing: 0; }
.user-input {
  width: 130px; border: 1px solid var(--border); border-radius: 8px;
  padding: 9px 12px; font-size: 13px; background: var(--surface2);
  color: var(--text); transition: border-color .2s;
}
.user-input:focus { outline: none; border-color: var(--accent); }

.btn {
  padding: 9px 20px; border-radius: 8px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all .18s;
}
.btn-primary {
  background: var(--accent); color: #fff;
}
.btn-primary:hover { background: #c53030; transform: translateY(-1px);
                      box-shadow: 0 4px 12px rgba(229,62,62,.35); }
.btn-primary:active { transform: translateY(0); }
.btn-outline {
  background: transparent; color: var(--muted);
  border: 1px solid var(--border);
}
.btn-outline:hover { background: var(--surface2); color: var(--text); }

/* ═══════════════════════════════════════════════════════════════
   Summary bar
═══════════════════════════════════════════════════════════════ */
.summary-bar {
  display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
}
.summary-pill {
  padding: 5px 14px; border-radius: 20px; font-size: 12px;
  font-weight: 600; display: flex; align-items: center; gap: 5px;
}
.pill-all      { background: var(--gray-bg);  color: var(--muted);   border: 1px solid var(--gray-bd);  }
.pill-ontime   { background: var(--green-bg); color: var(--green);   border: 1px solid var(--green-bd); }
.pill-delayed  { background: var(--red-bg);   color: var(--red);     border: 1px solid var(--red-bd);   }
.pill-boarding { background: var(--amber-bg); color: var(--amber);   border: 1px solid var(--amber-bd); }
.pill-departed { background: var(--blue-bg);  color: var(--blue);    border: 1px solid var(--blue-bd);  }

/* ═══════════════════════════════════════════════════════════════
   Flight cards grid
═══════════════════════════════════════════════════════════════ */
#flightGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

.flight-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 18px 20px;
  box-shadow: var(--shadow);
  transition: box-shadow .2s, transform .2s;
  position: relative; overflow: hidden;
  cursor: pointer;
}
.flight-card:hover {
  box-shadow: var(--shadow-lg); transform: translateY(-2px);
}

/* colour accent stripe on left edge */
.flight-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
}
.card-on-time::before  { background: var(--green); }
.card-delayed::before  { background: var(--red); }
.card-boarding::before { background: var(--amber); }
.card-departed::before { background: var(--blue); }
.card-landed::before   { background: #805ad5; }
.card-cancelled::before { background: #a0aec0; }

/* ── status change flash animation ── */
@keyframes status-flash {
  0%   { background: var(--flash-color, #fffde7); }
  100% { background: var(--surface); }
}
.card-flash { animation: status-flash 1.8s ease-out; }

/* card internals */
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.flight-num {
  font-size: 18px; font-weight: 800; letter-spacing: .5px;
  font-family: 'Courier New', monospace;
}
.status-badge {
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700; letter-spacing: .5px;
  text-transform: uppercase;
}
.badge-on-time   { background: var(--green-bg); color: var(--green);
                   border: 1px solid var(--green-bd); }
.badge-delayed   { background: var(--red-bg);   color: var(--red);
                   border: 1px solid var(--red-bd); }
.badge-boarding  { background: var(--amber-bg); color: var(--amber);
                   border: 1px solid var(--amber-bd); }
.badge-departed  { background: var(--blue-bg);  color: var(--blue);
                   border: 1px solid var(--blue-bd); }
.badge-landed    { background: #faf5ff; color: #805ad5;
                   border: 1px solid #e9d8fd; }
.badge-cancelled { background: var(--gray-bg);  color: var(--muted);
                   border: 1px solid var(--gray-bd); }

.route {
  display: flex; align-items: center; gap: 0; margin-bottom: 14px;
}
.airport { text-align: center; }
.iata { font-size: 26px; font-weight: 800; line-height: 1;
        font-family: 'Courier New', monospace; }
.city { font-size: 10px; color: var(--muted); margin-top: 2px; }
.route-line {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 2px; padding: 0 10px;
}
.route-track {
  width: 100%; height: 1.5px; background: var(--border);
  position: relative;
}
.route-track::after {
  content: '✈'; position: absolute; top: -9px; left: 50%;
  transform: translateX(-50%); font-size: 14px; color: var(--accent);
}
.route-label { font-size: 10px; color: var(--muted); margin-top: 4px; }

.times {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 12px;
}
.time-block { }
.time-label { font-size: 10px; color: var(--muted);
               text-transform: uppercase; letter-spacing: .8px; }
.time-value { font-size: 15px; font-weight: 700;
               font-family: 'Courier New', monospace; }
.time-orig  { font-size: 11px; color: var(--muted);
               text-decoration: line-through; }
.time-new   { font-size: 15px; font-weight: 700;
               font-family: 'Courier New', monospace; color: var(--red); }

.delay-bar {
  background: var(--red-bg); border: 1px solid var(--red-bd);
  border-radius: 8px; padding: 8px 12px; margin-bottom: 12px;
  font-size: 12px; color: var(--red); display: none;
}
.delay-bar.visible { display: flex; align-items: center; gap: 6px; }

.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; color: var(--muted); border-top: 1px solid var(--border);
  padding-top: 10px;
}
.countdown { font-weight: 600; color: var(--text); }
.countdown.urgent { color: var(--red); }
.remove-btn {
  background: none; border: none; font-size: 14px; cursor: pointer;
  color: var(--muted); padding: 2px 6px; border-radius: 4px;
  transition: all .15s;
}
.remove-btn:hover { background: var(--red-bg); color: var(--red); }

/* ═══════════════════════════════════════════════════════════════
   Empty state
═══════════════════════════════════════════════════════════════ */
.empty-state {
  grid-column: 1 / -1; text-align: center;
  padding: 60px 20px; color: var(--muted);
}
.empty-icon { font-size: 48px; margin-bottom: 14px; }
.empty-title { font-size: 17px; font-weight: 600; margin-bottom: 6px;
               color: var(--text); }
.empty-sub { font-size: 13px; line-height: 1.6; }

/* ═══════════════════════════════════════════════════════════════
   Sidebar – Notifications + Quick-add
═══════════════════════════════════════════════════════════════ */
.sidebar { display: flex; flex-direction: column; gap: 20px; }

.sidebar-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 18px 20px;
  box-shadow: var(--shadow);
}

/* quick-add chips */
.quick-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.chip {
  padding: 4px 10px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 11px; font-family: 'Courier New', monospace; font-weight: 600;
  cursor: pointer; color: var(--muted); transition: all .15s;
}
.chip:hover {
  background: var(--red-bg); border-color: var(--red-bd); color: var(--red);
}

/* notification list */
.notif-list { display: flex; flex-direction: column; gap: 10px; }
.notif-empty {
  text-align: center; padding: 24px; color: var(--muted); font-size: 13px;
}

.notif-item {
  background: var(--surface2); border-radius: 8px;
  border-left: 3px solid var(--border);
  padding: 10px 12px;
  font-size: 12px; line-height: 1.5;
  animation: slide-down .25s ease;
}
@keyframes slide-down {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.notif-item.delay    { border-left-color: var(--red);   background: var(--red-bg); }
.notif-item.boarding { border-left-color: var(--amber); background: var(--amber-bg); }
.notif-item.ok       { border-left-color: var(--green); background: var(--green-bg); }
.notif-item.info     { border-left-color: var(--blue);  background: var(--blue-bg); }

.notif-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 3px;
}
.notif-flight { font-weight: 700; font-family: 'Courier New', monospace; }
.notif-time   { font-size: 10px; color: var(--muted); }
.notif-msg    { color: var(--text); }

/* toast popup */
.toast-container {
  position: fixed; bottom: 24px; right: 24px;
  display: flex; flex-direction: column-reverse; gap: 10px; z-index: 200;
}
.toast {
  background: var(--surface); border-radius: 10px; padding: 14px 18px;
  border: 1px solid var(--border); box-shadow: var(--shadow-lg);
  max-width: 340px; font-size: 13px; line-height: 1.5;
  animation: toast-in .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes toast-in {
  from { opacity: 0; transform: translateX(40px) scale(.95); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}
.toast.hiding {
  animation: toast-out .3s ease forwards;
}
@keyframes toast-out {
  to { opacity: 0; transform: translateX(50px); }
}
.toast-title { font-weight: 700; margin-bottom: 4px; }
.toast.delay    { border-left: 4px solid var(--red);   }
.toast.boarding { border-left: 4px solid var(--amber); }
.toast.ok       { border-left: 4px solid var(--green); }
.toast.info     { border-left: 4px solid var(--blue);  }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-icon">✈</div>
    <div class="logo-name">make<span>MyTrip</span></div>
  </div>
  <div class="ws-status">
    <div class="ws-dot connecting" id="wsDot"></div>
    <span id="wsLabel">Connecting…</span>
  </div>
</header>

<!-- ── Toast container ───────────────────────────────────────────── -->
<div class="toast-container" id="toastContainer"></div>

<!-- ── Main ──────────────────────────────────────────────────────── -->
<main>

  <!-- Left column -->
  <div>
    <!-- Track bar -->
    <div class="track-bar">
      <input type="text" id="userIdInput" class="user-input"
             placeholder="User ID" value="demo_user">
      <input type="text" id="flightInput"
             placeholder="Flight number, e.g. AI302" maxlength="8"
             oninput="this.value=this.value.toUpperCase()">
      <button class="btn btn-primary" onclick="trackFlight()">Track</button>
      <button class="btn btn-outline"  onclick="loadAllFlights()">Load All</button>
    </div>

    <!-- Summary pills -->
    <div class="summary-bar" id="summaryBar"></div>

    <!-- Section heading -->
    <div class="section-heading">Live Flight Status</div>

    <!-- Cards grid -->
    <div id="flightGrid">
      <div class="empty-state">
        <div class="empty-icon">✈</div>
        <div class="empty-title">No flights loaded</div>
        <div class="empty-sub">
          Enter a flight number above and click <strong>Track</strong>,
          or click <strong>Load All</strong> to see every flight.
        </div>
      </div>
    </div>
  </div>

  <!-- Right sidebar -->
  <div class="sidebar">

    <!-- Quick-add -->
    <div class="sidebar-card">
      <div class="section-heading">Quick Track</div>
      <div class="quick-chips" id="quickChips"></div>
    </div>

    <!-- Notifications -->
    <div class="sidebar-card">
      <div class="section-heading">Live Notifications</div>
      <div class="notif-list" id="notifList">
        <div class="notif-empty">Notifications will appear here once connected.</div>
      </div>
    </div>

  </div>
</main>

<script>
// ═══════════════════════════════════════════════════════════════════
//  Configuration
// ═══════════════════════════════════════════════════════════════════
const API_BASE  = 'http://localhost:8080/api/flights';
const WS_URL    = 'http://localhost:8080/ws';
const MAX_NOTIF = 30;   // cap sidebar notification list
const MAX_TOAST = 4;    // max simultaneous toasts

// Known flights for quick-add chips
const KNOWN_FLIGHTS = [
  'AI302','AI506','6E4521','6E2341','SG101',
  'SG455','UK835','UK915','QP1131','IX771','G8203','AI891'
];

// ═══════════════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════════════
let stompClient     = null;
let subscriptions   = {};           // flightNumber → STOMP subscription
let displayedCards  = {};           // flightNumber → live DOM card element
let countdownTimers = {};           // flightNumber → setInterval id
let notifCount      = 0;

// ═══════════════════════════════════════════════════════════════════
//  Boot
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  renderQuickChips();
  connectWebSocket();
  startCountdownLoop();

  // Enter key on flight input
  document.getElementById('flightInput')
    .addEventListener('keydown', e => { if (e.key === 'Enter') trackFlight(); });
});

// ═══════════════════════════════════════════════════════════════════
//  Quick-add chips
// ═══════════════════════════════════════════════════════════════════
function renderQuickChips() {
  const container = document.getElementById('quickChips');
  container.innerHTML = KNOWN_FLIGHTS.map(fn =>
    `<span class="chip" onclick="quickAdd('${fn}')">${fn}</span>`
  ).join('');
}

function quickAdd(fn) {
  document.getElementById('flightInput').value = fn;
  trackFlight();
}

// ═══════════════════════════════════════════════════════════════════
//  WebSocket Connection
// ═══════════════════════════════════════════════════════════════════
function connectWebSocket() {
  setWsStatus('connecting');

  const socket = new SockJS(WS_URL);
  stompClient = Stomp.over(socket);
  stompClient.debug = null; // suppress STOMP debug logs

  stompClient.connect({}, () => {
    setWsStatus('connected');
    // Re-subscribe to any flights already displayed after reconnect
    Object.keys(displayedCards).forEach(fn => subscribeToFlight(fn));
  }, () => {
    setWsStatus('error');
    // Auto-reconnect after 5 seconds
    setTimeout(connectWebSocket, 5000);
  });
}

function setWsStatus(state) {
  const dot   = document.getElementById('wsDot');
  const label = document.getElementById('wsLabel');
  dot.className = 'ws-dot ' + state;
  label.textContent = { connecting: 'Connecting…', connected: 'Live', error: 'Reconnecting…' }[state];
}

// Subscribe to a flight's topic
function subscribeToFlight(flightNumber) {
  if (!stompClient || !stompClient.connected) return;
  if (subscriptions[flightNumber]) return; // already subscribed

  const topic = `/topic/flights/${flightNumber}`;
  subscriptions[flightNumber] = stompClient.subscribe(topic, (msg) => {
    const notification = JSON.parse(msg.body);
    handleWebSocketUpdate(notification);
  });
}

// Unsubscribe when a card is removed
function unsubscribeFromFlight(flightNumber) {
  if (subscriptions[flightNumber]) {
    subscriptions[flightNumber].unsubscribe();
    delete subscriptions[flightNumber];
  }
}

// ═══════════════════════════════════════════════════════════════════
//  WebSocket notification handler
// ═══════════════════════════════════════════════════════════════════
function handleWebSocketUpdate(notification) {
  const fn = notification.flightNumber;

  // Build a fake flightData object from notification fields
  // (enough to update the card; a full re-fetch isn't needed)
  const card = displayedCards[fn];
  if (card) {
    // Minimal patch – update status badge, departure/arrival, delay bar
    patchCard(fn, {
      status: notification.newStatus,
      delayMinutes: notification.delayMinutes,
      estimatedDeparture: notification.newEstimatedDeparture,
      estimatedArrival: notification.newEstimatedArrival,
    });
    flashCard(fn, notification.notificationType);
  }

  // Add sidebar notification
  addSidebarNotification(notification);

  // Show toast for significant events
  const significant = ['DELAY_UPDATE','BOARDING_STARTED','STATUS_NORMALISED','CANCELLATION'];
  if (significant.includes(notification.notificationType)) {
    showToast(notification);
  }

  updateSummaryBar();
}

// ═══════════════════════════════════════════════════════════════════
//  REST API calls
// ═══════════════════════════════════════════════════════════════════
async function trackFlight() {
  const fn     = document.getElementById('flightInput').value.trim().toUpperCase();
  const userId = document.getElementById('userIdInput').value.trim() || 'demo_user';
  if (!fn) return;

  // If already displayed, just scroll to it
  if (displayedCards[fn]) {
    displayedCards[fn].scrollIntoView({ behavior: 'smooth', block: 'center' });
    document.getElementById('flightInput').value = '';
    return;
  }

  try {
    // POST to track endpoint
    const res = await fetch(`${API_BASE}/track`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, flightNumber: fn })
    });

    if (res.status === 409) {
      // Already tracked — just fetch current status and show
      await fetchAndDisplayFlight(fn);
    } else if (!res.ok) {
      const err = await res.json();
      showToastRaw('error', fn, err.message || 'Unknown error');
      return;
    } else {
      const body = await res.json();
      renderFlightCard(body.data);
      subscribeToFlight(fn);
    }

    document.getElementById('flightInput').value = '';
    updateSummaryBar();
  } catch (e) {
    console.error('trackFlight error:', e);
    showToastRaw('error', fn, 'Could not connect to server. Is the backend running?');
  }
}

async function fetchAndDisplayFlight(fn) {
  try {
    const res  = await fetch(`${API_BASE}/${fn}`);
    const body = await res.json();
    if (res.ok && body.data) {
      renderFlightCard(body.data);
      subscribeToFlight(fn);
    } else {
      showToastRaw('error', fn, body.message || 'Flight not found');
    }
  } catch (e) {
    console.error('fetchAndDisplayFlight error:', e);
  }
}

async function loadAllFlights() {
  try {
    const res  = await fetch(`${API_BASE}/all`);
    const body = await res.json();
    if (!res.ok) { alert(body.message || 'Error loading flights'); return; }
    body.data.forEach(f => {
      if (!displayedCards[f.flightNumber]) {
        renderFlightCard(f);
        subscribeToFlight(f.flightNumber);
      }
    });
    updateSummaryBar();
  } catch (e) {
    console.error('loadAllFlights error:', e);
    showToastRaw('error', 'ALL', 'Could not connect to server.');
  }
}

async function removeFlight(fn) {
  const userId = document.getElementById('userIdInput').value.trim() || 'demo_user';
  try {
    await fetch(`${API_BASE}/untrack`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, flightNumber: fn })
    });
  } catch (e) { /* silently ignore */ }

  unsubscribeFromFlight(fn);
  clearInterval(countdownTimers[fn]);
  delete countdownTimers[fn];

  const card = displayedCards[fn];
  if (card) {
    card.style.transition = 'opacity .3s, transform .3s';
    card.style.opacity = '0';
    card.style.transform = 'scale(.96)';
    setTimeout(() => { card.remove(); delete displayedCards[fn]; updateSummaryBar(); }, 300);
  }
}

// ═══════════════════════════════════════════════════════════════════
//  Card rendering
// ═══════════════════════════════════════════════════════════════════
function renderFlightCard(f) {
  // Remove empty state if present
  const grid = document.getElementById('flightGrid');
  const empty = grid.querySelector('.empty-state');
  if (empty) empty.remove();

  // Build card
  const card = document.createElement('div');
  card.id = `card-${f.flightNumber}`;
  card.className = `flight-card card-${statusClass(f.status)}`;
  card.innerHTML = buildCardHTML(f);
  grid.appendChild(card);
  displayedCards[f.flightNumber] = card;
}

function buildCardHTML(f) {
  const delayed = f.status === 'DELAYED' && f.delayMinutes > 0;
  const depTime = formatTime(f.estimatedDeparture);
  const arrTime = formatTime(f.estimatedArrival);
  const schDep  = formatTime(f.scheduledDeparture);
  const mins    = f.minutesToDeparture;

  return `
    <div class="card-header">
      <div class="flight-num">${f.flightNumber}</div>
      <div class="status-badge badge-${statusClass(f.status)}">${statusLabel(f.status)}</div>
      <button class="remove-btn" onclick="removeFlight('${f.flightNumber}')" title="Remove">✕</button>
    </div>

    <div class="route">
      <div class="airport">
        <div class="iata">${f.origin}</div>
        <div class="city">${f.origin}</div>
      </div>
      <div class="route-line">
        <div class="route-track"></div>
        <div class="route-label">${f.aircraftType || ''}</div>
      </div>
      <div class="airport" style="text-align:right">
        <div class="iata">${f.destination}</div>
        <div class="city">${f.destination}</div>
      </div>
    </div>

    <div class="times">
      <div class="time-block">
        <div class="time-label">Departure</div>
        ${delayed
          ? `<div class="time-orig">${schDep}</div><div class="time-new">${depTime}</div>`
          : `<div class="time-value">${depTime}</div>`}
      </div>
      <div class="time-block">
        <div class="time-label">Arrival (ETA)</div>
        <div class="time-value">${arrTime}</div>
      </div>
    </div>

    <div class="delay-bar ${delayed ? 'visible' : ''}" id="delay-${f.flightNumber}">
      ⏱ Delayed ${f.delayMinutes} min — ${f.delayReasonDescription || ''}
    </div>

    <div class="card-footer">
      <div>🚪 Gate ${f.gate || '—'} · ${f.terminal || ''}</div>
      <div class="countdown ${Math.abs(mins) < 30 ? 'urgent' : ''}"
           id="countdown-${f.flightNumber}">
        ${countdownText(mins, f.status)}
      </div>
    </div>
  `;
}

// Patch specific fields on an existing card without full re-render
function patchCard(fn, patch) {
  const f = { ...patch };
  const card = displayedCards[fn];
  if (!card) return;

  // Status badge
  const badge = card.querySelector('.status-badge');
  if (badge) {
    badge.className = `status-badge badge-${statusClass(f.status)}`;
    badge.textContent = statusLabel(f.status);
  }
  card.className = `flight-card card-${statusClass(f.status)}`;

  // Delay bar
  const delayBar = card.querySelector(`#delay-${fn}`);
  if (delayBar) {
    const delayed = f.status === 'DELAYED' && f.delayMinutes > 0;
    delayBar.classList.toggle('visible', delayed);
    if (delayed) {
      delayBar.textContent = `⏱ Delayed ${f.delayMinutes} min`;
    }
  }

  // Update arrival time
  const times = card.querySelectorAll('.time-value');
  if (times.length >= 2 && f.estimatedArrival) {
    times[times.length - 1].textContent = formatTime(f.estimatedArrival);
  }
}

// ═══════════════════════════════════════════════════════════════════
//  Flash animation on status change
// ═══════════════════════════════════════════════════════════════════
function flashCard(fn, notifType) {
  const card = displayedCards[fn];
  if (!card) return;

  const colorMap = {
    DELAY_UPDATE:     '#fff5f5',
    BOARDING_STARTED: '#fffff0',
    STATUS_NORMALISED:'#f0fff4',
    DEPARTURE_CHANGE: '#ebf8ff',
  };
  const color = colorMap[notifType] || '#fffde7';
  card.style.setProperty('--flash-color', color);
  card.classList.remove('card-flash');
  // Force reflow so animation re-fires
  void card.offsetWidth;
  card.classList.add('card-flash');
}

// ═══════════════════════════════════════════════════════════════════
//  Countdown timer loop
// ═══════════════════════════════════════════════════════════════════
function startCountdownLoop() {
  setInterval(() => {
    Object.keys(displayedCards).forEach(fn => {
      const el = document.getElementById(`countdown-${fn}`);
      if (!el) return;
      // We don't store full flight data locally; parse the current displayed text
      // and decrement. For accuracy, re-fetch periodically.
    });
  }, 60_000); // update every minute
}

// ═══════════════════════════════════════════════════════════════════
//  Summary bar
// ═══════════════════════════════════════════════════════════════════
function updateSummaryBar() {
  const counts = { total: 0, ON_TIME: 0, DELAYED: 0, BOARDING: 0, DEPARTED: 0 };
  Object.keys(displayedCards).forEach(fn => {
    counts.total++;
    const badge = displayedCards[fn].querySelector('.status-badge');
    if (!badge) return;
    const text = badge.textContent.trim().toUpperCase().replace(/ /g,'_');
    if (counts[text] !== undefined) counts[text]++;
  });

  const bar = document.getElementById('summaryBar');
  if (counts.total === 0) { bar.innerHTML = ''; return; }

  bar.innerHTML = `
    <span class="summary-pill pill-all">✈ ${counts.total} flights</span>
    ${counts.ON_TIME  ? `<span class="summary-pill pill-ontime">✅ ${counts.ON_TIME} On Time</span>`    : ''}
    ${counts.DELAYED  ? `<span class="summary-pill pill-delayed">⏱ ${counts.DELAYED} Delayed</span>`  : ''}
    ${counts.BOARDING ? `<span class="summary-pill pill-boarding">🚪 ${counts.BOARDING} Boarding</span>` : ''}
    ${counts.DEPARTED ? `<span class="summary-pill pill-departed">🛫 ${counts.DEPARTED} Departed</span>` : ''}
  `;
}

// ═══════════════════════════════════════════════════════════════════
//  Sidebar notifications
// ═══════════════════════════════════════════════════════════════════
function addSidebarNotification(notification) {
  const list = document.getElementById('notifList');

  // Remove empty placeholder
  const empty = list.querySelector('.notif-empty');
  if (empty) empty.remove();

  const type    = notifTypeClass(notification.notificationType);
  const time    = new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  const item    = document.createElement('div');
  item.className = `notif-item ${type}`;
  item.innerHTML = `
    <div class="notif-header">
      <span class="notif-flight">${notification.flightNumber}</span>
      <span class="notif-time">${time}</span>
    </div>
    <div class="notif-msg">${notification.message}</div>
  `;

  list.insertBefore(item, list.firstChild);
  notifCount++;

  // Cap list length
  while (list.children.length > MAX_NOTIF) {
    list.removeChild(list.lastChild);
  }
}

// ═══════════════════════════════════════════════════════════════════
//  Toast notifications
// ═══════════════════════════════════════════════════════════════════
function showToast(notification) {
  const type = notifTypeClass(notification.notificationType);
  showToastRaw(type, notification.flightNumber, notification.message);
}

function showToastRaw(type, title, msg) {
  const container = document.getElementById('toastContainer');

  // Cap toasts
  while (container.children.length >= MAX_TOAST) {
    container.removeChild(container.lastChild);
  }

  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<div class="toast-title">${title}</div><div>${msg}</div>`;
  container.appendChild(toast);

  setTimeout(() => {
    toast.classList.add('hiding');
    setTimeout(() => toast.remove(), 350);
  }, 5500);
}

// ═══════════════════════════════════════════════════════════════════
//  Utility helpers
// ═══════════════════════════════════════════════════════════════════
function statusClass(s) {
  const map = {
    ON_TIME:'on-time', DELAYED:'delayed', BOARDING:'boarding',
    DEPARTED:'departed', LANDED:'landed', CANCELLED:'cancelled'
  };
  return map[s] || 'on-time';
}

function statusLabel(s) {
  const map = {
    ON_TIME:'On Time', DELAYED:'Delayed', BOARDING:'Boarding',
    DEPARTED:'Departed', LANDED:'Landed', CANCELLED:'Cancelled'
  };
  return map[s] || s;
}

function notifTypeClass(t) {
  const map = {
    DELAY_UPDATE:'delay', BOARDING_STARTED:'boarding',
    STATUS_NORMALISED:'ok', DEPARTURE_CHANGE:'info',
    ETA_UPDATE:'info', CANCELLATION:'delay'
  };
  return map[t] || 'info';
}

function formatTime(isoStr) {
  if (!isoStr) return '—';
  try {
    const d = new Date(isoStr);
    return d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12: false });
  } catch { return isoStr.substring(11, 16); }
}

function countdownText(minutes, status) {
  if (status === 'DEPARTED' || status === 'LANDED') return '🛫 Departed';
  if (status === 'CANCELLED') return '❌ Cancelled';
  if (status === 'BOARDING')  return '🚪 Boarding now';
  if (minutes < 0)  return `Dep. ${Math.abs(minutes)}m ago`;
  if (minutes === 0) return 'Departing now';
  if (minutes < 60) return `Dep. in ${minutes}m`;
  const h = Math.floor(minutes / 60), m = minutes % 60;
  return `Dep. in ${h}h ${m}m`;
}
