spring.application.name=makemytrip
server.port=${PORT:8080}

# MongoDB Atlas — override via MONGODB_URI env var in production
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://SharathKumara:Sharath2006@main.ipuj1iu.mongodb.net/?appName=Main}
spring.data.mongodb.database=makemytrip

# Scheduling
spring.task.scheduling.pool.size=5

# Caffeine cache — 30s TTL matches simulator interval
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=30s

# Logging
logging.level.com.makemytrip.flight=INFO
logging.level.org.springframework.web.socket=WARN
